<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Travel Planner Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    color:#333;
}

header{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    color:white;
    padding:18px 30px;
    font-size:24px;
    font-weight:bold;
    box-shadow:0 4px 20px rgba(0,0,0,0.3);
}

.container{
    display:flex;
    flex-wrap:wrap;
    padding:30px;
    gap:25px;
}

.form-box{
    flex:1;
    min-width:320px;
    background:white;
    padding:25px;
    border-radius:18px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border-radius:10px;
    border:1px solid #ddd;
}

button{
    margin-top:15px;
    padding:12px;
    border-radius:10px;
    border:none;
    background:linear-gradient(135deg,#2a5298,#1e3c72);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

#result{
    margin-top:20px;
    background:#f4f7fb;
    padding:15px;
    border-radius:12px;
    max-height:300px;
    overflow-y:auto;
}

#loader{
    display:none;
    text-align:center;
    margin-top:15px;
}

.loader{
    border:4px solid #f3f3f3;
    border-top:4px solid #2a5298;
    border-radius:50%;
    width:30px;
    height:30px;
    animation:spin 1s linear infinite;
    margin:10px auto;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

#map{
    flex:1;
    min-width:320px;
    height:550px;
    border-radius:18px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

footer{
    text-align:center;
    padding:15px;
    color:white;
    font-size:13px;
}

@media(max-width:768px){
    .container{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<header>🌍 AI Travel Planner </header>

<div class="container">

<div class="form-box">
<h3>Plan Smart Trip</h3>

<form id="tripForm">
<input type="text" id="destination" placeholder="Destination (e.g Pune)" required>
<input type="number" id="days" placeholder="Days" required>
<input type="number" id="min_budget" placeholder="Minimum Budget" required>
<input type="number" id="max_budget" placeholder="Maximum Budget" required>
<button type="submit">Generate AI Plan</button>
</form>

<div id="loader">
Generating AI Plan...
<div class="loader"></div>
</div>

<div id="result"></div>

</div>

<div id="map"></div>

</div>

<footer>
Built with Flask + ML + AI
</footer>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([20.5937, 78.9629], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap contributors'
}).addTo(map);

let markers = [];
let routeLine;

function clearMap(){
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    if(routeLine) map.removeLayer(routeLine);
}

async function getCoordinates(place){
    const response = await fetch(
        `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(place)}`
    );
    const data = await response.json();
    if(data.length>0){
        return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
    }
    return null;
}

async function getWikiImage(place){
    try{
        const res = await fetch(
            `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(place)}`
        );
        const data = await res.json();
        if(data.thumbnail) return data.thumbnail.source;
        return null;
    }catch{
        return null;
    }
}

function fallbackImage(place){
    return `https://source.unsplash.com/400x300/?${encodeURIComponent(place)},travel`;
}

async function showPlaces(destination, itinerary){

    clearMap();

    const lines = itinerary.split("\n");
    const places = lines.filter(l => l.trim().startsWith("-"));

    let coordsList = [];
    let index=1;
    let dayColor="#1e3c72";

    for(const line of places){

        const place=line.replace("-","").trim();
        const fullPlace=place+", "+destination;

        const coords=await getCoordinates(fullPlace);

        if(coords){

            let img=await getWikiImage(place);
            if(!img) img=fallbackImage(place);

            const icon=L.divIcon({
                html:`<div style="
                background:${dayColor};
                color:white;
                border-radius:50%;
                width:30px;
                height:30px;
                display:flex;
                align-items:center;
                justify-content:center;
                font-weight:bold;">${index}</div>`,
                className:""
            });

            const popup=`
            <div style="text-align:center;width:220px;">
            <h4>${place}</h4>
            <img src="${img}" width="200" style="border-radius:10px;">
            </div>
            `;

            const marker=L.marker(coords,{icon:icon})
                .addTo(map)
                .bindPopup(popup);

            markers.push(marker);
            coordsList.push(coords);
            index++;
        }

        await new Promise(r=>setTimeout(r,500));
    }

    if(coordsList.length>0){
        map.fitBounds(coordsList,{padding:[40,40]});
        routeLine=L.polyline(coordsList,{color:"red"}).addTo(map);
    }
}

document.getElementById("tripForm").addEventListener("submit",async function(e){

e.preventDefault();

document.getElementById("loader").style.display="block";
document.getElementById("result").innerHTML="";

const destination=document.getElementById("destination").value;
const days=document.getElementById("days").value;
const min_budget=document.getElementById("min_budget").value;
const max_budget=document.getElementById("max_budget").value;

const response=await fetch("/plan",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({destination,days,min_budget,max_budget})
});

const data=await response.json();

document.getElementById("loader").style.display="none";

if(data.itinerary){

document.getElementById("result").innerHTML=
"<b>🗓 Your AI Trip Plan:</b><br><br>"+
data.itinerary.replace(/\n/g,"<br>");

showPlaces(destination,data.itinerary);

}else{
document.getElementById("result").innerHTML=
"<span style='color:red'>Error: "+data.error+"</span>";
}

});

</script>

</body>
</html>
